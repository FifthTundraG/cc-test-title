<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cc-test-title</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="content">
            <div class="container">
            <div class="sidebar">
                <p style="margin-bottom:0;">welcome to...</p>
                <h1 style="margin-top:0.5rem;">clicker cookie</h1>

                <div class="buttons">
                    <p id="buttonNewGame">new game</p>
                    <p id="buttonLoadGame">load game</p>
                    <p id="buttonMods">mods</p>
                    <p id="buttonSettings">settings</p>
                </div>
            </div>
            <div class="button-content">
                <div id="bttnContentNone" style="display: block;"> <!-- default display is none -->
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/68/Orange_tabby_cat_sitting_on_fallen_leaves-Hisashi-01A.jpg/250px-Orange_tabby_cat_sitting_on_fallen_leaves-Hisashi-01A.jpg" alt="temp">
                </div>
                <div id="bttnContentNewGame">
                    <label for="saveNameInput">Save Name:</label>
                    <input type="text" name="saveNameInput" id="saveNameInput" placeholder="Super Epic Fun Bakery!">
                    <button id="startNewGame" class="bottom-right-button">Begin</button> <!-- todo: style -->
                </div>
                <div id="bttnContentLoadGame">
                    <h2>load game</h2>
                </div>
                <div id="bttnContentMods">
                    <div class="mods-header">
                        <h2>mods</h2>
                        <button class="help-button">?</button>
                    </div>
                    <button id="addModButton" class="bottom-right-button">+</button>
                </div>
                <div id="bttnContentSettings">
                    <h2>settings</h2>
                </div>
            </div>
        </div>
        <div class="social-links">
            <img src="GitHub_Invertocat_Black.svg" alt="GitHub link">
        </div>
        </div>
    </main>
    <dialog id="dialogAddMod" class="dialog-add-mod">
        <h2>Add Mod</h2>

        <div class="add-methods">
            <div style="border-right: 1px solid gray;">
                <h3>From URL</h3>
                <form onsubmit="return false;" id="addModURLForm" style="margin-top:22px;">
                    <label for="addModURL" class="popup-text">From URL: </label>
                    <input id="addModURL">
                    <input type="submit" value="->">
                </form>
            </div>
            <div>
                <h3>From File</h3>
                <form>
                    <label for="addModFile" class="popup-text" style="margin-right:0px;">From File: </label>
                    <input type="file" id="addModFile" accept=".js" class="popup-text" style="width:86px;">
                </form>
            </div>
        </div>

        <div class="bottom-container">
            <div class="mod-data-preview">
                <img src="https://cdn.modrinth.com/data/AANobbMI/295862f4724dc3f78df3447ad6072b2dcd3ef0c9_96.webp" alt="mod icon">
                <div class="mod-text-container">
                    <h3>Sodium</h3>
                    <p class="desc">A high-performance rendering engine replacement for Clicker Cookie, which greatly improves frame rates and reduces micro-stutter.</p>
                </div>
            </div>
        </div>

        <div>
            <button id="exitDialogAddModButton">Exit</button>
            <button>Add</button>
        </div>
    </dialog>
    <script src="./main.js"></script>
</body>
</html>
